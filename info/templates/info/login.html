<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>College ERP Login</title>
    {% load static %}

    <style>
        body {
            font-family: Arial, sans-serif;
            background-image: url("{% static 'info/images/background.jpg' %}");
            background-size: cover;
            background-position: center center;
            background-attachment: fixed;
            
        }
        .background-image {
            position: fixed;
            z-index: -1;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("{% static 'info/images/background.jpg' %}");
            background-size: cover;
            background-position: center center;
            filter: blur(5px);
        }
        .header {
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100vw;
            height: 7vw;
            min-height: 8vh;
            background-color: rgba(31, 30, 30, 0.24);
            transition: 0.3s ease background-color;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .logo {
            width: 100px;
            margin-top: 10px;
            cursor: pointer;
            display: flex;
            justify-content: flex-start;
            align-items: center;
        }

        .college-name {
            font-size: 2em;
            color: #fff;
            text-shadow: 1px 1px 1px rgba(0, 0, 0, 0.5);
        }
        .container {
            width: 30%;
            padding: 50px;
            background-color: #fff;
            border-radius: 10px;
            background-color: rgba(0, 0, 0, 0.623);
            color: #fff;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
        }
        h1 {
            text-align: center;
            font-size: 2em;
        }
        label {
            display: block;
            font-size: 1.1em;
            margin-bottom: 5px;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 10px;
            font-size: 1em;
            border-radius: 5px;
            border: 1px solid #ccc;
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        input[type="submit"] {
            background-color: #4CAF50;
            color: #fff;
            padding: 10px;
            font-size: 1.2em;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        input[type="submit"]:hover {
            background-color: #333;
        }
    </style>
</head>
<body>
    <div class="logo">
        <img src="{% static 'info/images/logo.jpg' %}" alt="College Logo" class="logo">
    </div>
    <div class="header">
        
        <h1 class="college-name">Navsahyadri Group of Institutions Field of Engineering
        </h1>
    </div>
    <div class="background-image"></div>
    <div class="container">
        <h1>College ERP Login</h1>
        <form method="post">
          {% csrf_token %}
          {{ form.as_p }}
            <div style="text-align: center;">
                <input type="submit" value="Login">
              </div>
        </form>
    </div>
     
    <!-- Bootstrap core JavaScript-->
    <script src="{% static '/info/bootstrap/vendor/jquery/jquery.min.js' %}"></script>
    <script src="{% static '/info/bootstrap/vendor/bootstrap/js/bootstrap.bundle.min.js' %}"></script>
 
    <!-- Core plugin JavaScript-->
    <script src="{% static '/info/bootstrap/vendor/jquery-easing/jquery.easing.min.js' %}"></script>
 
  </body>
</html>
